name: Daily Caffe Panna Flavor Alerts

on:
  schedule:
    - cron: '0 13 * * *'  # 9am ET (UTC-4 summer) / adjust to '0 14 * * *' in winter
  workflow_dispatch:       # lets you trigger manually from GitHub for testing

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd scraper
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Scrape and notify
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_PHONE: ${{ secrets.TWILIO_PHONE }}
        run: |
          cd scraper
          python main.py
